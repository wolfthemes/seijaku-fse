name: Deploy seijaku-fse to SiteGround

on:
  push:
    branches:
      - master
      - stage

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install JS dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint JS
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

      - name: Type check
        run: npm run type-check

      - name: Lint PHP
        if: github.ref == 'refs/heads/master'
        run: ./vendor/bin/phpcs --standard=./.phpcs.xml.dist --runtime-set ignore_warnings_on_exit 1

      - name: Build assets
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 1

  deploy-master:
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync build to staging dir
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            build/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/seijaku-fse-build/

      - name: Deploy PHP and swap build assets
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/customer/www/wolfthemes.com/public_html/wp-content/themes/seijaku-fse
            git pull origin master
            rsync -a --delete /tmp/seijaku-fse-build/ build/
            rm -rf /tmp/seijaku-fse-build

  deploy-stage:
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/stage'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync build to staging dir
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            build/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/seijaku-fse-build/

      - name: Deploy PHP and swap build assets
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/customer/www/staging20.wolfthemes.com/public_html/wp-content/themes/seijaku-fse
            git pull origin stage
            rsync -a --delete /tmp/seijaku-fse-build/ build/
            rm -rf /tmp/seijaku-fse-build
